<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Darts</title>
  <meta name="description" content="Golf Darts scorekeeper with multiplayer support, history, leaderboard, and ELO." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#eef4ea;
      --bg-2:#e4eddc;
      --panel:#f9fcf6cc;
      --panel-solid:#f7fbf3;
      --ink:#162015;
      --muted:#63725f;
      --line:#d2dfcb;
      --green:#2d7b46;
      --green-deep:#184f2b;
      --sand:#d9b76b;
      --sky:#78c3e6;
      --warn:#b53f3f;
      --good:#2f8d58;
      --shadow:0 24px 60px rgba(35,59,28,.12);
      --radius:24px;
      --max:1420px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      color:var(--ink);
      font-family:"Inter", sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(120,195,230,.18), transparent 22%),
        radial-gradient(circle at 82% 12%, rgba(217,183,107,.18), transparent 18%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.2;
      background:
        linear-gradient(rgba(22,32,21,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22,32,21,.03) 1px, transparent 1px);
      background-size:28px 28px;
      mask-image:radial-gradient(circle at center, black 48%, transparent 92%);
    }

    .shell{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      padding:20px 0 42px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      padding:8px 0 18px;
      border-bottom:1px solid rgba(22,32,21,.08);
      margin-bottom:24px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .badge{
      width:60px;
      height:60px;
      border-radius:18px;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.75), transparent 24%),
        linear-gradient(145deg, rgba(45,123,70,.18), rgba(120,195,230,.14)),
        var(--panel-solid);
      border:1px solid rgba(22,32,21,.08);
      box-shadow:0 24px 60px rgba(35,59,28,.12);
      position:relative;
      overflow:hidden;
    }

    .badge::before{
      content:"⛳";
      font-size:1.7rem;
      transform:translateY(1px);
    }

    .brand-copy h1{
      margin:0;
      font-family:"Anton", sans-serif;
      font-size:clamp(2.4rem, 5vw, 4.5rem);
      line-height:.92;
      letter-spacing:.04em;
      font-weight:400;
      text-transform:uppercase;
    }

    .brand-copy p{
      margin:5px 0 0;
      color:var(--muted);
      max-width:58ch;
      font-size:.96rem;
    }

    .header-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .layout{
      display:grid;
      grid-template-columns:1.06fr .94fr;
      gap:22px;
      align-items:start;
    }

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.4));
      border:1px solid rgba(22,32,21,.08);
      border-radius:var(--radius);
      box-shadow:0 24px 60px rgba(35,59,28,.12);
      backdrop-filter:blur(12px);
      overflow:hidden;
    }

    .panel-inner{padding:22px}
    .hidden{display:none !important}

    .hero{
      display:grid;
      grid-template-columns:1.08fr .92fr;
      min-height:470px;
    }

    .hero-copy{
      padding:28px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:20px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--green);
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:.78rem;
      font-weight:800;
    }

    .eyebrow::before{
      content:"";
      width:28px;
      height:1px;
      background:currentColor;
    }

    .hero-copy h2{
      margin:0;
      font-family:"Anton", sans-serif;
      font-size:clamp(3.1rem, 7vw, 6.3rem);
      line-height:.9;
      letter-spacing:.04em;
      text-transform:uppercase;
      max-width:8ch;
      font-weight:400;
    }

    .hero-copy p{
      margin:0;
      color:var(--muted);
      max-width:52ch;
      font-size:1rem;
    }

    .rule-stack{
      display:grid;
      gap:12px;
    }

    .rule{
      padding:14px 16px;
      border-radius:16px;
      border:1px solid rgba(22,32,21,.08);
      background:rgba(255,255,255,.4);
      color:var(--muted);
    }

    .rule strong{color:var(--ink)}

    .hero-visual{
      position:relative;
      min-height:100%;
      border-left:1px solid rgba(22,32,21,.08);
      background:
        radial-gradient(circle at 25% 24%, rgba(120,195,230,.18), transparent 22%),
        radial-gradient(circle at 78% 62%, rgba(217,183,107,.18), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.14), transparent 55%);
      overflow:hidden;
    }

    .course{
      position:absolute;
      inset:24px;
      border-radius:28px;
      background:
        radial-gradient(circle at 70% 22%, #f0d694 0 8%, transparent 8.5%),
        radial-gradient(circle at 72% 24%, rgba(0,0,0,.08), transparent 18%),
        radial-gradient(circle at 28% 72%, #f0d694 0 10%, transparent 10.5%),
        linear-gradient(180deg, #8ccf72 0%, #5baa56 38%, #4e9a47 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.16),
        inset 0 0 80px rgba(0,0,0,.08),
        0 30px 70px rgba(32,52,27,.16);
      overflow:hidden;
    }

    .course::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 62% 18%, #15351d 0 1.1%, transparent 1.3%),
        linear-gradient(135deg, transparent 0 36%, rgba(255,255,255,.16) 36% 38%, transparent 38%),
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.18), transparent 20%),
        radial-gradient(circle at 84% 82%, rgba(255,255,255,.15), transparent 18%);
      opacity:.95;
    }

    .flag{
      position:absolute;
      right:24%;
      top:16%;
      width:4px;
      height:110px;
      background:#f7f4ea;
      box-shadow:0 6px 18px rgba(0,0,0,.15);
    }

    .flag::before{
      content:"";
      position:absolute;
      top:0;
      left:4px;
      width:44px;
      height:26px;
      background:linear-gradient(135deg, #f24c4c, #c42f2f);
      clip-path:polygon(0 0, 100% 18%, 82% 100%, 0 100%);
    }

    .ring{
      position:absolute;
      border-radius:50%;
      border:1px dashed rgba(255,255,255,.3);
    }

    .ring.r1{width:210px;height:210px;left:10%;bottom:10%}
    .ring.r2{width:140px;height:140px;right:8%;bottom:14%}
    .ring.r3{width:88px;height:88px;left:44%;top:18%}

    .section-title{
      margin:0;
      font-family:"Anton", sans-serif;
      font-size:2rem;
      letter-spacing:.05em;
      font-weight:400;
      text-transform:uppercase;
    }

    .sub{
      color:var(--muted);
      font-size:.92rem;
      font-weight:700;
    }

    .player-list{
      display:grid;
      gap:12px;
      margin-top:14px;
    }

    .player-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:end;
    }

    .field label{
      display:block;
      margin-bottom:8px;
      color:var(--muted);
      font-size:.82rem;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:800;
    }

    .field input,
    .field select{
      width:100%;
      padding:15px 16px;
      border-radius:16px;
      border:1px solid rgba(22,32,21,.1);
      background:rgba(255,255,255,.75);
      color:var(--ink);
      font:inherit;
      outline:none;
      transition:.2s ease;
    }

    .field input:focus,
    .field select:focus{
      border-color:rgba(45,123,70,.35);
      box-shadow:0 0 0 4px rgba(45,123,70,.12);
      transform:translateY(-1px);
    }

    .remove-player{
      min-width:50px;
      min-height:52px;
      border-radius:16px;
      background:linear-gradient(135deg, #b53f3f, #d56060);
      color:white;
      border:1px solid rgba(22,32,21,.08);
      font-weight:900;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:18px;
    }

    button{
      border:0;
      cursor:pointer;
      font:inherit;
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease;
    }

    button:hover{transform:translateY(-2px)}
    button:active{transform:translateY(0) scale(.98)}

    .btn{
      padding:14px 18px;
      border-radius:16px;
      border:1px solid rgba(22,32,21,.08);
      background:rgba(255,255,255,.55);
      color:var(--ink);
      font-weight:800;
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--green), #3d9759);
      color:white;
      box-shadow:0 14px 28px rgba(45,123,70,.18);
    }

    .btn-alt{
      background:linear-gradient(135deg, var(--sky), #9ad6ef);
      color:#113243;
      box-shadow:0 14px 28px rgba(120,195,230,.18);
    }

    .btn-warn{
      background:linear-gradient(135deg, #a53b3b, #c85656);
      color:white;
    }

    .btn-good{
      background:linear-gradient(135deg, #2f8d58, #47a96f);
      color:white;
    }

    .game-layout{
      display:grid;
      grid-template-columns:1fr .96fr;
      gap:22px;
      margin-top:22px;
    }

    .meta-strip{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
      margin-bottom:18px;
    }

    .meta{
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,.45);
      border:1px solid rgba(22,32,21,.08);
    }

    .meta .k{
      display:block;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.13em;
      font-size:.72rem;
      font-weight:800;
      margin-bottom:8px;
    }

    .meta .v{
      font-family:"Anton", sans-serif;
      font-size:2rem;
      line-height:1;
      letter-spacing:.04em;
      font-weight:400;
      text-transform:uppercase;
    }

    .hole-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:70px;
      padding:8px 12px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--sand), #e8cb8b);
      color:#3d3010;
      box-shadow:0 10px 22px rgba(217,183,107,.2);
    }

    .mult-row{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
      margin-bottom:18px;
    }

    .mult-btn{
      padding:16px 12px;
      border-radius:18px;
      background:rgba(255,255,255,.5);
      border:1px solid rgba(22,32,21,.08);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--ink);
    }

    .mult-btn.active{
      background:linear-gradient(135deg, rgba(45,123,70,.16), rgba(45,123,70,.06));
      border-color:rgba(45,123,70,.35);
      box-shadow:0 10px 22px rgba(45,123,70,.10);
    }

    .target-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
      margin-bottom:18px;
    }

    .target-btn{
      min-height:76px;
      border-radius:20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.42)),
        var(--panel-solid);
      border:1px solid rgba(22,32,21,.08);
      box-shadow:0 10px 22px rgba(35,59,28,.08);
      font-family:"Anton", sans-serif;
      font-size:1.95rem;
      letter-spacing:.05em;
      color:var(--ink);
      position:relative;
      overflow:hidden;
    }

    .target-btn::after{
      content:"";
      position:absolute;
      inset:auto -15% -45% -15%;
      height:100%;
      background:radial-gradient(circle, rgba(45,123,70,.08), transparent 55%);
      transform:translateY(24px);
      transition:transform .2s ease;
    }

    .target-btn:hover::after{transform:translateY(10px)}

    .target-btn.bull{
      background:
        linear-gradient(180deg, rgba(255,250,236,.82), rgba(255,255,255,.42)),
        var(--panel-solid);
      border-color:rgba(217,183,107,.35);
      color:#6b531d;
    }

    .target-btn.current-hole{
      outline:3px solid rgba(45,123,70,.25);
      outline-offset:-3px;
      background:
        linear-gradient(180deg, rgba(220,245,227,.95), rgba(255,255,255,.5)),
        var(--panel-solid);
    }

    .action-row{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .announce{
      margin-top:18px;
      min-height:60px;
      padding:16px 18px;
      border-radius:16px;
      border:1px solid rgba(22,32,21,.08);
      background:rgba(255,255,255,.45);
      display:flex;
      align-items:center;
      font-weight:800;
    }

    .announce.good{
      background:rgba(47,141,88,.10);
      border-color:rgba(47,141,88,.20);
      color:#20553a;
    }

    .announce.warn{
      background:rgba(181,63,63,.10);
      border-color:rgba(181,63,63,.18);
      color:#7c2c2c;
    }

    .score-head{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:12px;
      margin-bottom:14px;
    }

    .table-wrap{
      overflow:auto;
    }

    table{
      width:100%;
      min-width:940px;
      border-collapse:collapse;
    }

    th, td{
      padding:10px 8px
