<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Darts Scorer</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #fbc02d;
            --danger: #c62828;
            --bg: #f5f5f5;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--primary); }

        .setup, .game, .winner-screen { display: none; }
        .active { display: block; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 16px;
        }

        button {
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
            font-weight: bold;
        }

        .btn-start { background: var(--primary); color: white; }
        .btn-action { background: #eee; margin: 5px 0; }
        .btn-score { background: #e8f5e9; border: 2px solid var(--primary); color: var(--primary); }
        .btn-miss { background: #ffebee; border: 2px solid var(--danger); color: var(--danger); }
        .btn-undo { background: #616161; color: white; margin-top: 15px; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .hole-highlight {
            font-size: 24px;
            background: var(--secondary);
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .scoreboard {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .scoreboard th, .scoreboard td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        .scoreboard th { background: #f8f8f8; }

        .dart-indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .dart {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .dart.active { background: var(--secondary); display: flex; }

        .winner-banner {
            background: var(--secondary);
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⛳ Golf Darts Scorer</h1>

        <!-- Setup Screen -->
        <div id="setup" class="setup active">
            <div class="input-group">
                <label>Game Length</label>
                <select id="hole-count">
                    <option value="9">9 Holes</option>
                    <option value="18">18 Holes</option>
                </select>
            </div>
            <div class="input-group">
                <label>Player Names (comma separated)</label>
                <input type="text" id="player-names" placeholder="e.g. Alex, Jordan, Sam">
            </div>
            <button class="btn-start" onclick="startGame()">Start Game</button>
        </div>

        <!-- Game Screen -->
        <div id="game" class="game">
            <div class="status-bar">
                <div>Player: <strong id="current-player-display">---</strong></div>
                <div class="hole-highlight">Hole: <span id="current-hole-display">1</span></div>
            </div>

            <div class="dart-indicators" id="dart-indicators">
                <div class="dart" id="dart-1">1</div>
                <div class="dart" id="dart-2">2</div>
                <div class="dart" id="dart-3">3</div>
            </div>

            <div class="controls">
                <button class="btn-score" onclick="recordDart(1)">Double (1 pt)</button>
                <button class="btn-score" onclick="recordDart(2)">Triple (2 pts)</button>
                <button class="btn-score" onclick="recordDart(3)">Inner Single (3 pts)</button>
                <button class="btn-score" onclick="recordDart(4)">Outer Single (4 pts)</button>
                <button class="btn-miss" onclick="recordDart(5)">Miss (5 pts)</button>
                <button class="btn-undo" onclick="undoLast()">Undo Last Dart</button>
            </div>

            <table class="scoreboard" id="game-scoreboard">
                <thead>
                    <tr><th>Player</th><th>Score</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Winner Screen -->
        <div id="winner-screen" class="winner-screen">
            <div class="winner-banner">
                <h2>🏆 <span id="winner-name">---</span> Wins!</h2>
            </div>
            <table class="scoreboard" id="final-scoreboard">
                <thead>
                    <tr><th>Player</th><th>Total</th><th>Avg/Hole</th><th>Hole-in-1s</th><th>Doubles</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <button class="btn-start" style="margin-top: 20px;" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        let players = [];
        let totalHoles = 9;
        let currentHole = 1;
        let currentPlayerIndex = 0;
        let currentDart = 0;
        let roundScores = []; // Stores the 3 darts for the current player's hole
        let history = []; // For Undo functionality

        function startGame() {
            const namesInput = document.getElementById('player-names').value;
            if (!namesInput) return alert("Enter at least one player name.");

            totalHoles = parseInt(document.getElementById('hole-count').value);
            players = namesInput.split(',').map(n => ({
                name: n.trim(),
                scores: [], // Array of best score per hole
                allDarts: [] // Store every dart for stats
            }));

            document.getElementById('setup').classList.remove('active');
            document.getElementById('game').classList.add('active');
            updateDisplay();
        }

        function recordDart(score) {
            // Save state for undo
            history.push({
                players: JSON.parse(JSON.stringify(players)),
                currentHole,
                currentPlayerIndex,
                currentDart,
                roundScores: [...roundScores]
            });

            roundScores.push(score);
            currentDart++;

            if (currentDart === 3) {
                // End of round for this player on this hole
                const bestScore = Math.min(...roundScores);
                players[currentPlayerIndex].scores.push(bestScore);
                players[currentPlayerIndex].allDarts.push(...roundScores);

                // Move to next player
                currentPlayerIndex++;
                currentDart = 0;
                roundScores = [];

                // If all players finished the hole, move to next hole
                if (currentPlayerIndex >= players.length) {
                    currentPlayerIndex = 0;
                    currentHole++;
                }
            }

            if (currentHole > totalHoles) {
                showWinner();
            } else {
                updateDisplay();
            }
        }

        function undoLast() {
            if (history.length === 0) return;
            const lastState = history.pop();
            players = lastState.players;
            currentHole = lastState.currentHole;
            currentPlayerIndex = lastState.currentPlayerIndex;
            currentDart = lastState.currentDart;
            roundScores = lastState.roundScores;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('current-player-display').innerText = players[currentPlayerIndex].name;
            document.getElementById('current-hole-display').innerText = currentHole;

            // Update dart indicators
            for (let i = 1; i <= 3; i++) {
                const el = document.getElementById(`dart-${i}`);
                el.style.background = i <= currentDart ? '#fbc02d' : '#ddd';
                el.innerText = roundScores[i-1] || i;
            }

            // Update in-game scoreboard
            const tbody = document.querySelector('#game-scoreboard tbody');
            tbody.innerHTML = players.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.scores.reduce((a, b) => a + b, 0)}</td>
                </tr>
            `).join('');
        }

        function showWinner() {
            document.getElementById('game').classList.remove('active');
            document.getElementById('winner-screen').classList.add('active');

            const sorted = [...players].sort((a, b) => {
                const totalA = a.scores.reduce((sum, s) => sum + s, 0);
                const totalB = b.scores.reduce((sum, s) => sum + s, 0);
                return totalA - totalB;
            });

            document.getElementById('winner-name').innerText = sorted[0].name;

            const tbody = document.querySelector('#final-scoreboard tbody');
            tbody.innerHTML = sorted.map(p => {
                const total = p.scores.reduce((a, b) => a + b, 0);
                const avg = (total / totalHoles).toFixed(2);
                const holeInOnes = p.scores.filter(s => s === 1).length;
                const doubles = p.allDarts.filter(d => d === 1).length;
                
                return `
                    <tr>
                        <td><strong>${p.name}</strong></td>
                        <td>${total}</td>
                        <td>${avg}</td>
                        <td>${holeInOnes}</td>
                        <td>${doubles}</td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
